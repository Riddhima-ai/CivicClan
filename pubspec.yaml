name: civiclens
description: Civic Clan - Community Issue Reporting Platform
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0

  # Google Sign In
  google_sign_in: ^7.1.1

  # State Management
  provider: ^6.1.5

  # Image Picker
  image_picker: ^1.1.2

  # Images
  cached_network_image: ^3.4.1

  # Maps & Location
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  syncfusion_flutter_maps: ^30.1.42

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^11.1.0
  url_launcher: ^6.3.2

  # Connectivity
  connectivity_plus: ^7.0.0

  # UI
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.0
  fluttertoast: ^8.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/maps/